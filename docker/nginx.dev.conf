upstream backend  { server backend:3000; }
upstream frontend { server frontend:3001; }

server {
    listen 80;
    client_max_body_size 10M;

    # ── Frontend API: AI 비서 (찰떡) ────────────────────────────
    # frontend의 Next.js route(/app/api/ai-assistant/*)가 호스트 RAG/Agent/Open WebUI 직렬 호출
    # 일반 질문 경로는 RAG 답변 + 거절 판정 + Open WebUI 검색·답변 + SearxNG fallback 까지 합쳐
    # 수 분 걸릴 수 있음 (gemma4:26b 가 큰 모델). 240s 로 여유.
    location /api/ai-assistant/ {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # SSE 스트리밍 — 버퍼링 끄고 즉시 flush 해야 토큰이 곧장 client 에 도달
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
    }

    # ── Backend API (그 외 모든 /api/*) ─────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Next.js HMR WebSocket ──────────────────────────────────
    location /_next/webpack-hmr {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Frontend (Next.js) ─────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
